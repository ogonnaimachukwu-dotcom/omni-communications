services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omni}
      POSTGRES_DB: omni
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  migrate:
    build: { context: .., dockerfile: docker/Dockerfile, target: migrate }
    env_file: ../.env
    depends_on:
      db: { condition: service_healthy }
    networks: [internal]
    restart: "no"

  web:
    build: { context: .., dockerfile: docker/Dockerfile, target: web }
    env_file: ../.env
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    networks: [internal]
    restart: unless-stopped

  worker:
    build: { context: .., dockerfile: docker/Dockerfile, target: worker }
    env_file: ../.env
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    networks: [internal]
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on: [web]
    networks: [internal]

volumes:
  pgdata:
  caddydata:
  caddyconfig:

networks:
  internal:
